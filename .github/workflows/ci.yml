name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # `.env` is not committed. `vite build` uses production mode, so it does not load `.env.test`.
    # Match `.env.test` so lint / test / build always have valid `VITE_SUPABASE_*` for the Supabase client module.
    env:
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder_only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
